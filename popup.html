<html>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="src/popup.css">
  <body id="ipsum-wizard">
    <h1>Ipsum Wizard 🧙‍♂️</h1>
    <h2>Conjure dummy text whenever you need it.</h2>
    <form>
      <fieldset>
        <label for="paragraphs">Number of paragraphs:</label>
        <input type="number" id="paragraphs" name="paragraphs" min="1" max="10" value="3">
      </fieldset>
      <button type="submit">Conjure <span aria-hidden="true">🪄</span></button>
    </form>
    <script src="dist/popup.js"></script>
  </body>
</html>
